name: nogi

on:
  # schedule:
  #   - cron: '20,50 * * * *'
  # push:
  #   branches:
  #     - master
  workflow_dispatch:

jobs:
  nogi:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Clone private repo
      env:
        GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
      run: |
        git clone https://x-access-token:${GITHUB_TOKEN}@github.com/SakamichiSeries/kanbai-table
        cd kanbai-table

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8' # Specify the Python version you need

    - name: Set up env
      run: |
        pip install requests
        pip install pytz
        pip install selenium
        pip install Pillow
        pip install python-dotenv
        sudo apt install unzip wget p7zip-full tmux -y
        cat google-chrome-stable_134.0.6998.88-1_amd64.deb.part-* > google-chrome-stable_134.0.6998.88-1_amd64.deb
        sudo apt install ./google-chrome-stable_134.0.6998.88-1_amd64.deb -y --allow-downgrades
        unzip chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/bin/chromedriver
        sudo chmod +x /usr/bin/chromedriver

    - name: Run Python script
      working-directory: ./kanbai-table/
      run: |
        wget -q https://github.com/be5invis/Sarasa-Gothic/releases/download/v1.0.29/SarasaUiJ-TTF-1.0.29.7z
        7z x SarasaUiJ-TTF-1.0.29.7z
        sudo cp *.ttf /usr/local/share/fonts
        fc-cache -f -v
        fc-list | grep Sarasa
        npm install
        tmux new-session -d -s mysession 'npm run dev'
        python public/nogi/gen_table.py
      env:
          PAT: ${{ secrets.PAT }}          
          COOKIE_BASE64: ${{ secrets.COOKIE_BASE64 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Commit changes
      working-directory: ./kanbai-table/
      run: |
              git remote set-url origin https://SakamichiSeries:${PAT}@github.com/SakamichiSeries/kanbai-table.git
              git config --global user.email "actions@github.com"    
              git config --global user.name "GitHub Actions"
              git add .
              git remote -v
              git remote get-url origin
              git commit -m "Nogizaka46 data updated at $(TZ='Asia/Tokyo' date)" || echo "No changes to commit"
              git push
      env:
          PAT: ${{ secrets.PAT }}          
          COOKIE_BASE64: ${{ secrets.COOKIE_BASE64 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

